name: artesanias_andinas
description: >
  App de gestión de productos artesanales andinos – SIS048 Desarrollo de Software II
  Unidad II: Clean Architecture + Inversión de Control con get_it

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Inyección de Dependencias ──────────────────────────────────────────────
  get_it: ^7.7.0          # Service locator (IoC container)

  # ── Gestión de Estado ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navegación ────────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Red / HTTP ────────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Persistencia Local ────────────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # ── Utilidades ────────────────────────────────────────────────────────────
  equatable: ^2.0.5        # Igualdad estructural en entidades
  dartz: ^0.10.1           # Either<Failure, T> para manejo de errores
  intl: ^0.19.0

  # ── UI ────────────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
